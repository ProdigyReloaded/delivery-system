name: prodigy
services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "25234:25234"
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_HOST=${DB_HOST}
      - MIX_ENV=prod
    networks:
      - prodigy-net

  wsrelay:
    image: cloudamqp/websocket-tcp-relay:latest
    ports:
      - "8081:8081"
    depends_on:
      - server
    volumes:
      - ./www:/var/www
    entrypoint:
      - /usr/bin/websocket-tcp-relay
      - --bind=0.0.0.0
      - --upstream=tcp://server:25234
      - --port=8081
      - --webroot=/var/www
    networks:
      - prodigy-net

  caddy:
    image: caddy:2.10.0-alpine
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    depends_on:
      - wsrelay
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./www:/var/www
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    restart: unless-stopped
    networks:
      - prodigy-net

networks:
  prodigy-net:
    driver: bridge

volumes:
  db_data:
  objects_data:
  init_state:
  caddy_data:
  caddy_config:
